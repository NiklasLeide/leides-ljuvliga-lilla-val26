<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <div id="tooltip" class="tooltip" role="tooltip" hidden></div>

  <script src="app.js"></script>
